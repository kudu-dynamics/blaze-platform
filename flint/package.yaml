name:                flint
version:             0.1.0.0
license:             BSD-2-Clause
author:
  - Matt (drone) Revelle <drone@bitrit.es>
  - Matt Parker <mp@kududyn.com>
  - Kevin Orr <kevino@kududyn.com>
maintainer:
  - Matt Parker <mp@kududyn.com>
  - Kevin Orr <kevino@kududyn.com>
  - Matt (drone) Revelle <drone@bitrit.es>
copyright:           "2024 Kudu Dynamics"
synopsis:            An analysis tool that aids in finding bugs.
category:            Program Analysis, Binary Analysis
description:         Please see the README.

flags:
  binaryninja:
    description:
      "Enable Binary Ninja support (through blaze-binaryninja and conditional compilation)"
    default: False
    manual: True

extra-source-files:
- README.md
- ChangeLog.md


dependencies:
  - aeson
  - aeson-pretty
  - algebraic-graphs
  - async
  - base >=4.7 && <5
  - bimap
  - binary-analysis
  - blaze
  - bv
  - bytestring
  - casing
  - constraints
  - containers
  - data-binary-ieee754
  - directory
  - dlist
  - envy
  - extra
  - generic-lens
  - generics-sop
  - ghidra
  - hashable
  - haskeline
  - lens
  - list-t
  - logict
  - megaparsec
  - mtl
  - newtype
  - parser-combinators
  - pretty-simple
  - random
  - raw-strings-qq
  - recursion-schemes
  - regex-tdfa
  - relude
  - selda
  - selda-sqlite
  - sbv
  - stm
  - string-conversions
  - template-haskell
  - text
  - time
  - transformers
  - unix
  - unordered-containers
  - uuid >=1.3.14
  - vector

language: GHC2021

default-extensions:
  - AllowAmbiguousTypes
  - DataKinds
  - DeriveAnyClass
  - DerivingStrategies
  - DuplicateRecordFields
  - FunctionalDependencies
  - GADTs
  - LambdaCase
  - NoImplicitPrelude
  - NoMonomorphismRestriction
  - OverloadedLabels
  - OverloadedStrings
  - TypeFamilies
  - ViewPatterns

when:
  - condition: flag(binaryninja)
    dependencies:
      - blaze-binaryninja
    cpp-options: -DFLINT_SUPPORT_BINARYNINJA

library:
  ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wredundant-constraints
  - -Wpartial-fields
  - -Wmissing-home-modules
  - -Wall
  - -threaded
  - -rtsopts
  - -with-rtsopts=-N
  - -O2
  - -funfolding-use-threshold=16
  - -fspecialise-aggressively
  source-dirs:
  - src
  exposed-modules:
  - Flint.Prelude
  - Flint.Analysis
  - Flint.Analysis.Path.Matcher
  - Flint.Analysis.Path.Matcher.Patterns
  - Flint.Analysis.Path.Matcher.Primitives
  - Flint.Analysis.Path.Matcher.Primitives.Library
  - Flint.Analysis.Path.Matcher.Primitives.Library.StdLib
  - Flint.Analysis.Path.Matcher.Primitives.Library.PrimSpec
  - Flint.Analysis.Path.Matcher.Logic.Combinators
  - Flint.Analysis.Path.Matcher.Stub
  - Flint.Analysis.References
  - Flint.Analysis.Uefi
  - Flint.App
  - Flint.Cfg
  - Flint.Cfg.Path
  - Flint.Cfg.Store
  - Flint.Graph
  - Flint.Query
  - Flint.SMTish
  - Flint.Types.Analysis
  - Flint.Types.Analysis.Path.Matcher
  - Flint.Types.Analysis.Path.Matcher.Func
  - Flint.Types.Analysis.Path.Matcher.PathPrep
  - Flint.Types.Analysis.Path.Matcher.Primitives
  - Flint.Types.CachedMap
  - Flint.Types.CachedCalc
  - Flint.Types.Cfg.Store
  - Flint.Types.Query
  - Flint.Types.Symbol
  - Flint.Util
  - Flint.Shell.Types
  - Flint.Shell.Command
  - Flint.Shell.Commands.Functions
  - Flint.Shell.Commands.Paths
  - Flint.Shell.Commands.Solver
  - Flint.Shell.Commands.WMI
  - Flint.Shell.Commands.TypeCheck
  - Flint.Shell.Repl

executables:
  flint:
    main: Main.hs
    source-dirs:  app/flint
    ghc-options:
    - -Wall
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -O2
    - -funfolding-use-threshold=16
    - -fspecialise-aggressively
    dependencies:
    - flint
    - optparse-applicative
  flint-shell:
    main: Main.hs
    source-dirs: app/flint-shell
    ghc-options:
    - -Wall
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - flint
    - haskeline
    - optparse-applicative
  flint-mcp:
    main: Main.hs
    source-dirs: app/flint-mcp
    ghc-options:
    - -Wall
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - flint
    - mcp-server
    - optparse-applicative
  flint_classic:
    main: Main.hs
    source-dirs:  app/flint_classic
    ghc-options:
    - -Wall
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - flint
    - optparse-applicative
  gen_flint_db:
    main: Main.hs
    source-dirs:  app/gen_flint_db
    ghc-options:
    - -Wall
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - flint
    - unix
    - optparse-applicative
  routes:
    main: Main.hs
    source-dirs:  app/routes
    ghc-options:
    - -Wall
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - flint
    - optparse-applicative
  binaryToGhidra:
    main: Main.hs
    source-dirs:  app/binaryToGhidra
    ghc-options:
    - -Wall
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - flint
    - optparse-applicative
  divelogger:
    main: Main.hs
    source-dirs: demo/Dive_Logger
    ghc-options:
    - -Wall
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - flint
  kernel:
    main: Main.hs
    source-dirs: demo/Kernel
    ghc-options:
    - -Wall
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - flint
  gen_primspec:
    main: Main.hs
    source-dirs: app/gen_primspec
    ghc-options:
    - -Wall
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - tomland
    - flint
    - optparse-applicative

tests:
  # Flint tests that don't depend on a concrete importer
  flint-general-test:
    main: Spec.hs
    source-dirs:
    - test
    ghc-options:
    - -Wall
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - flint
    - temporary
    - hspec
    build-tools:
      - hspec-discover
