name: build
on:
  push: # consider only running this on changes to *.hs, *.project, and *.yaml (possibly also Makefiles, and *.sh)
  pull_request:
    branches:
      - main
env:
  HASKELL_OPTIM: ${{ '-O0' }}
  # replace with actions/cache
  # key should be hash of Dockerfile, .github/workflows/build.yml,
  # stack.yaml, binary-analysis/package.yaml, ghidra-haskell/package.yaml,
  # blaze/package.yaml, and flint/package.yaml
  DOCKER_RUN_ID: ${{ 24531044890 }} # update this every run of docker.yml
permissions:
  contents: read
jobs:
  docker1:
    runs-on: ubuntu-24.04
    steps:
      - name: cache
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ runner.temp }}/haskellcache
            ${{ runner.temp }}/haskell.tar
            ${{ runner.temp }}/just-depscache
            ${{ runner.temp }}/just-deps.tar
          key: ${{ hashFiles('Dockerfile', '.github/workflows/build.yml', 'stack.yaml', 'binary-analysis/package.yaml', 'ghidra-haskell/package.yaml', 'blaze/package.yaml', 'flint/package.yaml') }}
      - name: cachemiss
        if: steps.cache.outputs.cache-hit != 'true'
        run: echo "cache miss"
  warnings:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: download # suggest rerunning docker.yml if this fails
        id: download
        uses: actions/download-artifact@v8
        with:
          name: just-deps
          run-id: ${{ env.DOCKER_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }} 
          path: /tmp
      - name: warnings
        run: |
          docker load --input /tmp/just-deps.tar
          docker run -w /mnt --mount type=bind,src=$(pwd),dst=/mnt just-deps:latest stack clean --allow-different-user
          docker run --rm -w /mnt --mount type=bind,src=$(pwd),dst=/mnt just-deps:latest stack --color always build --test --no-run-tests --pedantic --fast --allow-different-user
      - name: suggest
        if: ${{ failure() && steps.download.conclusion == 'failure' }}
        run: |
          echo "This probably failed because there is an " > $GITHUB_STEP_SUMMARY
          echo "issue with the cached docker image. Rerun " >> $GITHUB_STEP_SUMMARY
          echo "`image` workflow and copy the run ID into " >> $GITHUB_STEP_SUMMARY
          echo "`.github/workflows/build.yml` as the " >> $GITHUB_STEP_SUMMARY
          echo "\$DOCKER_RUN_ID env variable." >> $GITHUB_STEP_SUMMARY
  hlint:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: download
        uses: actions/download-artifact@v8
        with:
          name: haskell
          run-id: ${{ env.DOCKER_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }} 
          path: /tmp
      - name: hlint
        run: |
          docker load --input /tmp/haskell.tar
          docker run --rm -w /mnt --mount type=bind,src=$(pwd),dst=/mnt haskell:latest just hlint --color=always
  build:
    runs-on: ubuntu-24.04
    steps:
#      - name: checkout
#        uses: actions/checkout@v6
      - name: setup
        uses: docker/setup-buildx-action@v4
      - name: cache
        uses: actions/download-artifact@v8
        with:
          name: cache
          run-id: ${{ env.DOCKER_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }} 
          path: /tmp
      - name: builder # look into cache-to, cache-from with artifacts
        uses: docker/build-push-action@v7
        with:
          target: builder
          build-args: OPTIM=${{ env.HASKELL_OPTIM }}
          tags: builder:latest
          outputs: type=docker,dest=/tmp/builder.tar
          cache-from: type=local,src=/tmp/cache
      - name: test
        run: |
          docker load --input /tmp/builder.tar
          docker run builder:latest ls -l
          docker run builder:latest ls -l /out
          #docker run builder:latest file /out/run-tests
          docker run builder:latest uname -a
          docker info --format '{{.Architecture}}'
          docker image inspect builder:latest ; docker manifest inspect builder:latest ; docker run --rm builder:latest /out/run-tests --color
#      - name: deliver
#        uses: docker/build-push-action@v7
#        with:
#          target: deliver
