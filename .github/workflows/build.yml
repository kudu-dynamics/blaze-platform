name: build
on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
env:
  HASKELL_OPTIM: ${{ '-O0' }}
permissions:
  contents: read
jobs:
  docker:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: cache
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ runner.temp }}/haskell.tar
            #${{ runner.temp }}/cache
            ${{ runner.temp }}/just-deps.tar
          key: ${{ hashFiles('Dockerfile', '.github/workflows/build.yml', 'stack.yaml', 'binary-analysis/package.yaml', 'ghidra-haskell/package.yaml', 'blaze/package.yaml', 'flint/package.yaml') }}
      - name: driver
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/setup-buildx-action@v4
      - name: haskell
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          #cache-to: type=local,dest=${{ runner.temp }}/haskellcache
          outputs: type=docker,dest=${{ runner.temp }}/haskell.tar
          tags: haskell:latest
          target: haskell
      - name: just-deps
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          #cache-from: type=local,src=${{ runner.temp }}/haskellcache
          #cache-to: type=local,dest=${{ runner.temp }}/cache,mode=max
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=${{ runner.temp }}/just-deps.tar
          tags: just-deps:latest
          target: just-deps
      - name: upload haskell
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: haskell
          path: ${{ runner.temp }}/haskell.tar
      - name: upload just-deps
        uses: actions/upload-artifact@v7
        with:
          name: just-deps
          path: ${{ runner.temp }}/just-deps.tar
#      - name: upload cache
#        uses: actions/upload-artifact@v7
#        with:
#          name: cache
#          path: ${{ runner.temp }}/cache
  warnings:
    needs: docker
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: download
        id: download
        uses: actions/download-artifact@v8
        with:
          name: just-deps
          path: ${{ runner.temp }}
      - name: warnings
        run: |
          docker load --input ${{ runner.temp }}/just-deps.tar
          docker run -w /mnt --mount type=bind,src=$(pwd),dst=/mnt just-deps:latest stack clean --allow-different-user
          docker run --rm -w /mnt --mount type=bind,src=$(pwd),dst=/mnt just-deps:latest stack --color always build --test --no-run-tests --pedantic --fast --allow-different-user
  hlint:
    needs: docker
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: download
        uses: actions/download-artifact@v8
        with:
          name: haskell
          path: ${{ runner.temp }}
      - name: hlint
        run: |
          docker load --input ${{ runner.temp }}/haskell.tar
          docker run --rm -w /mnt --mount type=bind,src=$(pwd),dst=/mnt haskell:latest just hlint --color=always
  build:
    needs: docker
    runs-on: ubuntu-24.04
    steps:
#      - name: checkout
#        uses: actions/checkout@v6
      - name: setup
        uses: docker/setup-buildx-action@v4
#      - name: cache
#        uses: actions/download-artifact@v8
#        with:
#          name: cache
#          path: ${{ runner.temp }}
      - name: builder
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          #cache-from: type=local,src=${{ runner.temp }}/cache
          cache-from: type=gha
          target: builder
          build-args: OPTIM=${{ env.HASKELL_OPTIM }}
          tags: builder:latest
          outputs: type=docker,dest=${{ runner.temp }}/builder.tar
      - name: test
        run: |
          docker load --input ${{ runner.temp }}/builder.tar
          docker run builder:latest ls -l
          docker run builder:latest ls -l /out
          docker run builder:latest uname -a
          docker info --format '{{.Architecture}}'
          docker image inspect builder:latest
          docker run builder:latest dpkg --print-architecture
          docker run builder:latest apt install -yq --no-install-recommends file
          #docker run builder:latest dpkg -L file
          #docker run builder:latest /usr/bin/file /out/run-tests
          docker run --rm builder:latest /out/run-tests --color
#      - name: deliver
#        uses: docker/build-push-action@v7
#        with:
#          target: deliver
