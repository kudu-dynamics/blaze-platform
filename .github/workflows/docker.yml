name: image
on:
  workflow_dispatch:
  #push: # comment this out upon push to main
permissions:
  contents: read
jobs:
  docker:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: driver
        uses: docker/setup-buildx-action@v4
      - name: docker
        uses: docker/build-push-action@v7
        with:
          outputs: type=docker,dest=/tmp/myimage.tar
          tags: myimage:latest
          target: just-deps
      - name: upload
        uses: actions/upload-artifact@v7
        with:
          name: myimage
          path: /tmp/myimage.tar
#      - name: summary
#        run: |
#          echo "#COPY THIS" > $GITHUB_STEP_SUMMARY
