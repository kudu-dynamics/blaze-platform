name: image
on:
  workflow_dispatch:
  push:
    paths:
      - Dockerfile
      - .github/workflows/docker.yml
permissions:
  contents: read
jobs:
  docker:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: driver
        uses: docker/setup-buildx-action@v4
      - name: haskell
        uses: docker/build-push-action@v7
        with:
          context: .
          outputs: type=docker,dest=/tmp/haskell.tar
          tags: haskell:latest
          target: haskell
      - name: just-deps
        uses: docker/build-push-action@v7
        with:
          context: .
          outputs: type=docker,dest=/tmp/just-deps.tar
          tags: just-deps:latest
          target: just-deps
      - name: upload haskell
        uses: actions/upload-artifact@v7
        with:
          name: haskell
          path: /tmp/haskell.tar
      - name: upload just-deps
        uses: actions/upload-artifact@v7
        with:
          name: just-deps
          path: /tmp/just-deps.tar
      - name: summary
        run: |
          echo "# COPY THIS" > $GITHUB_STEP_SUMMARY
          echo $GITHUB_RUN_ID >> $GITHUB_STEP_SUMMARY
